<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-eval';
        style-src 'self' 'unsafe-inline';
      "
    >
    <title>Zen - VTuber Tracking System</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Hidden video element for webcam capture -->
    <video id="webcam" autoplay playsinline style="display: none;"></video>

    <!-- Main Three.js canvas will be injected here -->
    <div id="app"></div>

    <script type="module" src="./node_modules/@mediapipe/tasks-vision/vision_bundle.mjs"></script>
    <script type="module" src="renderer.js"></script>
  </body>
</html>
